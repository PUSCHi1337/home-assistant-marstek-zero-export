title: Marstek Zero Export
views:
  - title: Zero Export
    path: marstek-zero-export
    icon: mdi:transmission-tower-import
    cards:
      - type: entities
        title: Controller
        state_color: true
        entities:
          - input_boolean.marstek_zero_export_enabled
          - input_boolean.marstek_zero_export_soc_released
          - input_number.marstek_zero_export_target_grid_import
          - input_number.marstek_zero_export_min_soc
          - input_number.marstek_zero_export_start_soc
          - input_number.marstek_zero_export_min_discharge_power
          - input_number.marstek_zero_export_max_discharge_power

      - type: entities
        title: Marstek
        state_color: true
        entities:
          - sensor.your_marstek_soc
          - sensor.your_marstek_ac_power
          - number.your_marstek_discharge_power
          - select.your_marstek_user_mode
          - select.your_marstek_forced_mode
          - switch.your_marstek_rs485_control

      - type: history-graph
        title: Grid and Marstek power
        hours_to_show: 2
        entities:
          - sensor.your_grid_power
          - sensor.your_marstek_ac_power

